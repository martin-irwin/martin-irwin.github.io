<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGROLA E85 FINDER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Sawarabi+Gothic&family=Oswald:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<style>
  :root {
    --bg: #0a0a0a;
    --paper: #111;
    --border: #e8e000;
    --accent: #e8e000;
    --danger: #ff3300;
    --text: #e8e8e8;
    --muted: #555;
    --green: #00ff88;
    --card-bg: #161616;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    overflow-x: hidden;
  }

  /* HEADER STRIP */
  #header {
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 44px;
    border-bottom: 3px solid #000;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  #logo {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #000;
  }

  #logo span {
    background: #000;
    color: var(--accent);
    padding: 1px 6px;
    margin-left: 4px;
  }

  /* LANG SWITCH */
  #lang-switch {
    display: flex;
    gap: 0;
    border: 2px solid #000;
  }
  #lang-switch button {
    background: transparent;
    border: none;
    border-right: 2px solid #000;
    padding: 4px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #000;
    transition: background 0.1s;
  }
  #lang-switch button:last-child { border-right: none; }
  #lang-switch button.active, #lang-switch button:hover {
    background: #000;
    color: var(--accent);
  }

  /* STATUS BAR */
  #statusbar {
    background: #000;
    border-bottom: 1px solid var(--muted);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    flex-wrap: wrap;
  }
  #statusbar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 4px;
  }
  #statusbar .dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  #statusbar .dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #progress-bar {
    height: 2px;
    background: var(--muted);
    width: 120px;
    display: none;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  /* CONTROLS ROW */
  #controls {
    background: var(--paper);
    border-bottom: 2px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ctrl-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* FILTER TOGGLES */
  .filter-toggle {
    border: 2px solid var(--muted);
    background: transparent;
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.1s;
    text-transform: uppercase;
  }
  .filter-toggle.on {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  /* VIEW SWITCH */
  #view-switch {
    margin-left: auto;
    display: flex;
    border: 2px solid var(--border);
  }
  #view-switch button {
    background: transparent;
    border: none;
    border-right: 2px solid var(--border);
    padding: 4px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.1s;
  }
  #view-switch button:last-child { border-right: none; }
  #view-switch button.active {
    background: var(--border);
    color: #000;
  }

  /* SORT CONTROL */
  #sort-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #sort-select {
    background: var(--bg);
    border: 2px solid var(--muted);
    color: var(--text);
    padding: 3px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }

  /* LOCATE BUTTON */
  #btn-locate {
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  #btn-locate:hover {
    background: var(--green);
    color: #000;
  }

  #btn-refresh {
    background: transparent;
    border: 2px solid var(--muted);
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    height: calc(100vh - 44px - 30px - 50px);
    min-height: 400px;
  }

  /* MAP */
  #map-container {
    flex: 1;
    display: none;
    position: relative;
  }
  #map-container.visible { display: block; }
  #map { width: 100%; height: 100%; }

  /* LIST */
  #list-container {
    width: 100%;
    overflow-y: auto;
    border-right: 1px solid var(--muted);
    display: none;
  }
  #list-container.visible { display: block; }

  /* SPLIT VIEW */
  body.view-both #list-container {
    display: block;
    width: 380px;
    min-width: 280px;
    flex-shrink: 0;
  }
  body.view-both #map-container {
    display: block;
    flex: 1;
  }
  body.view-list #list-container { display: block; width: 100%; }
  body.view-map #map-container { display: block; width: 100%; }

  /* STATION CARD */
  .station-card {
    border-bottom: 1px solid #222;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .station-card:hover { background: #1a1a1a; }
  .station-card.highlighted { background: #1d1d00; border-left: 3px solid var(--accent); }
  .station-card.has-e85 { border-left: 3px solid var(--green); }
  .station-card.highlighted.has-e85 { border-left: 3px solid var(--accent); }

  .card-name {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 1px;
    padding-right: 60px;
  }
  .card-addr {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }
  .card-dist {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 13px;
    color: var(--accent);
    font-family: 'Oswald', sans-serif;
  }
  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 1px 6px;
    border: 1px solid var(--muted);
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tag.e85 {
    border-color: var(--green);
    color: var(--green);
    font-weight: bold;
  }
  .tag.hvo    { border-color: #00aaff; color: #00aaff; }
  .tag.adblue { border-color: #88aaff; color: #88aaff; }
  .tag.ev     { border-color: #00ffcc; color: #00ffcc; }
  .tag.cng    { border-color: #ff88ff; color: #ff88ff; }
  .tag.lpg    { border-color: #ffaa00; color: #ffaa00; }
  .tag.b95    { border-color: #aaaaaa; color: #aaaaaa; }
  .tag.b98    { border-color: #cccccc; color: #cccccc; }
  .tag.diesel { border-color: #ffdd44; color: #ffdd44; }
  .tag.wash   { border-color: #44ddff; color: #44ddff; }
  .tag.shop   { border-color: #ff99cc; color: #ff99cc; }

  .card-gmaps {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    color: #000;
    background: var(--accent);
    padding: 2px 8px;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .card-gmaps:hover { background: var(--text); }

  /* EMPTY STATE */
  #empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    display: none;
  }
  #empty-state.visible { display: block; }

  /* COUNT BAR */
  #count-bar {
    background: #000;
    border-top: 1px solid #222;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    position: sticky;
    bottom: 0;
  }
  #count-bar span { color: var(--accent); }

  /* LOADING OVERLAY */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
  }
  #loading-overlay.hidden { display: none; }
  .load-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 4px;
  }
  .load-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .load-bar-wrap {
    width: 300px;
    height: 4px;
    background: #222;
    border: 1px solid #333;
  }
  .load-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s;
    width: 0%;
  }
  #load-status {
    font-size: 11px;
    color: var(--text);
    max-width: 300px;
    text-align: center;
    min-height: 30px;
  }
  .load-cancel {
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    margin-top: 8px;
  }
  .load-cancel:hover { border-color: var(--danger); color: var(--danger); }

  /* Map popup */
  .leaflet-popup-content-wrapper {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }
  .leaflet-popup-tip { background: var(--paper); }
  .popup-name { font-family: 'Oswald', sans-serif; font-size: 15px; margin-bottom: 4px; }
  .popup-addr { color: var(--muted); font-size: 11px; margin-bottom: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--muted); }

  /* Hide the default Leaflet Routing Machine sidebar */
  .leaflet-routing-container { display: none !important; }

  /* Route info bar that appears when a route is drawn */
  #route-bar {
    display: none;
    background: #000;
    border-top: 2px solid var(--accent);
    padding: 6px 12px;
    font-size: 12px;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  #route-bar.visible { display: flex; }
  #route-bar .route-stat { color: var(--accent); font-family: 'Oswald', sans-serif; font-size: 16px; }
  #route-bar .route-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #btn-clear-route {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 3px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  #btn-clear-route:hover { background: var(--danger); color: #000; }

  /* Card route button */
  .card-route {
    display: inline-block;
    margin-top: 6px;
    margin-left: 6px;
    font-size: 10px;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent);
    padding: 2px 8px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .card-route:hover { background: var(--accent); color: #000; }

  /* Japanese font fallback for JP mode */
  body.lang-ja .card-name,
  body.lang-ja .card-addr,
  body.lang-ja .tag,
  body.lang-ja .ctrl-label,
  body.lang-ja #statusbar {
    font-family: 'Sawarabi Gothic', sans-serif;
  }
</style>
</head>
<body class="view-both">

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="load-title">AGROLA<span style="color:#fff">●</span>E85</div>
  <div class="load-sub" data-i18n="loading_init">INITIALISIERUNG — STANDORTE WERDEN GELADEN</div>
  <div class="load-bar-wrap"><div class="load-bar-fill" id="load-bar"></div></div>
  <div id="load-status"></div>
  <button class="load-cancel" id="btn-cancel-load">ABBRECHEN</button>
</div>

<!-- HEADER -->
<div id="header">
  <div id="logo">AGROLA <span>E85</span></div>
  <div id="lang-switch">
    <button onclick="setLang('de')" class="active" data-lang="de">DE</button>
    <button onclick="setLang('en')" data-lang="en">EN</button>
    <button onclick="setLang('ja')" data-lang="ja">JA</button>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div><span class="dot" id="dot-data"></span><span id="status-text">—</span></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="stat-total"><span id="n-total">0</span> <span data-i18n="stations">STANDORTE</span></div>
  <div id="stat-e85"><span id="n-e85" style="color:var(--green)">0</span> E85</div>
  <div id="stat-loc" style="color:var(--muted);display:none"><span data-i18n="your_loc">STANDORT</span>: <span id="loc-display">—</span></div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <span class="ctrl-label" data-i18n="filter">FILTER</span>
  <button class="filter-toggle" id="tog-e85" onclick="toggleFilter('e85')">E85</button>
  <button class="filter-toggle" id="tog-hvo" onclick="toggleFilter('hvo')">HVO</button>
  <button class="filter-toggle" id="tog-adblue" onclick="toggleFilter('adblue')">AdBlue</button>
  <button class="filter-toggle" id="tog-ev" onclick="toggleFilter('ev')">EV⚡</button>
  <button class="filter-toggle" id="tog-cng" onclick="toggleFilter('cng')">CNG</button>
  <button class="filter-toggle" id="tog-lpg" onclick="toggleFilter('lpg')">LPG</button>
  <button class="filter-toggle" id="tog-b95" onclick="toggleFilter('b95')">95</button>
  <button class="filter-toggle" id="tog-b98" onclick="toggleFilter('b98')">98</button>
  <button class="filter-toggle" id="tog-diesel" onclick="toggleFilter('diesel')">Diesel</button>
  <button class="filter-toggle" id="tog-wash" onclick="toggleFilter('wash')">🚿 Wash</button>
  <button class="filter-toggle" id="tog-shop" onclick="toggleFilter('shop')">🏪 Shop</button>

  <div id="sort-ctrl">
    <span class="ctrl-label" data-i18n="sort">SORT</span>
    <select id="sort-select" onchange="sortAndRender()">
      <option value="distance" data-i18n="by_distance">ENTFERNUNG</option>
      <option value="name" data-i18n="by_name">NAME</option>
    </select>
  </div>

  <button id="btn-locate" onclick="locateUser()">⌖ <span data-i18n="locate">ORTEN</span></button>
  <button id="btn-refresh" onclick="confirmRefresh()">↻ <span data-i18n="refresh">AKTUALISIEREN</span></button>

  <div id="view-switch">
    <button onclick="setView('list')" data-view="list" data-i18n="view_list">LISTE</button>
    <button onclick="setView('both')" data-view="both" class="active" data-i18n="view_both">BEIDE</button>
    <button onclick="setView('map')" data-view="map" data-i18n="view_map">KARTE</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="list-container" class="visible">
    <div id="station-list"></div>
    <div id="empty-state"><span data-i18n="no_results">KEINE ERGEBNISSE</span></div>
  </div>
  <div id="map-container" class="visible">
    <div id="map"></div>
  </div>
</div>

<!-- ROUTE BAR -->
<div id="route-bar">
  <div>
    <div class="route-stat" id="route-dist">—</div>
    <div class="route-label" data-i18n="route_dist">STRECKE</div>
  </div>
  <div>
    <div class="route-stat" id="route-time">—</div>
    <div class="route-label" data-i18n="route_time">FAHRZEIT</div>
  </div>
  <div id="route-dest" style="color:var(--text);font-size:12px"></div>
  <button id="btn-clear-route" onclick="clearRoute()">✕ ROUTE</button>
</div>

<!-- BOTTOM COUNT -->
<div id="count-bar">
  <span><span data-i18n="showing">ANZEIGE</span>: <span id="n-showing">0</span> / <span id="n-total-bot">0</span></span>
</div>

<script>
// ═══════════════════════════════════════════════════════
// I18N
// ═══════════════════════════════════════════════════════
const I18N = {
  de: {
    loading_init: 'INITIALISIERUNG — STANDORTE WERDEN GELADEN',
    stations: 'STANDORTE',
    your_loc: 'STANDORT',
    filter: 'FILTER',
    sort: 'SORT',
    by_distance: 'ENTFERNUNG',
    by_name: 'NAME',
    locate: 'ORTEN',
    refresh: 'AKTUALISIEREN',
    view_list: 'LISTE',
    view_both: 'BEIDE',
    view_map: 'KARTE',
    no_results: 'KEINE ERGEBNISSE',
    showing: 'ANZEIGE',
    navigate: 'NAVIGIEREN',
    status_loading: 'LADE STANDORTE...',
    status_done: 'DATEN GELADEN',
    status_error: 'FEHLER',
    status_idle: 'BEREIT',
    route_dist: 'STRECKE',
    route_time: 'FAHRZEIT',
    routing: 'ROUTE BERECHNEN',
    confirm_refresh: 'Alle Standortdaten neu laden? Dies kann ~1-2 Minuten dauern.',
    km_away: 'km',
    no_location: 'Standort nicht verfügbar',
    details_e85: 'E85 Bioethanol',
    details_hvo: 'HVO Diesel',
    details_h2: 'Wasserstoff',
    details_adblue: 'AdBlue®',
    details_ev: 'Elektro-Ladestation',
    fuels: 'KRAFTSTOFFE',
  },
  en: {

    stations: 'STATIONS',
    your_loc: 'YOUR LOC',
    filter: 'FILTER',
    sort: 'SORT',
    by_distance: 'DISTANCE',
    by_name: 'NAME',
    locate: 'LOCATE ME',
    refresh: 'REFRESH',
    view_list: 'LIST',
    view_both: 'BOTH',
    view_map: 'MAP',
    no_results: 'NO RESULTS',
    showing: 'SHOWING',
    navigate: 'NAVIGATE',
    status_loading: 'LOADING STATIONS...',
    status_done: 'DATA LOADED',
    status_error: 'ERROR',
    status_idle: 'READY',
    route_dist: 'DISTANCE',
    route_time: 'DRIVE TIME',
    routing: 'ROUTING',
    confirm_refresh: 'Reload all station data? This may take ~1-2 minutes.',
    km_away: 'km',

    details_e85: 'E85 Bioethanol',

    details_adblue: 'AdBlue®',

    fuels: 'FUELS',
  },
  ja: {

    stations: 'スタンド',
    your_loc: '現在地',
    filter: 'フィルター',
    sort: '並び替え',
    by_distance: '距離順',

    status_done: 'データ読み込み完了',
    status_error: 'エラー',

    route_dist: '距離',
    route_time: '所要時間',
    routing: 'ルート計算',
    confirm_refresh: 'スタンドデータを再読み込みしますか？約1〜2分かかります。',

    details_hvo: 'HVO ディーゼル',
    details_h2: '水素',
    details_adblue: 'AdBlue®',
    details_ev: 'EV充電',
    fuels: '燃料',
  }
};
let lang = 'de';

function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N['de'][key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.body.className = document.body.className.replace(/lang-\w+/, '').trim() + ' lang-' + l;
  applyI18n();
  sortAndRender();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.querySelector('#sort-select option[value="distance"]').textContent = t('by_distance');
  document.querySelector('#sort-select option[value="name"]').textContent = t('by_name');
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'agrola_stations_v6';
const API_KEY = 'xZGQPdiHSCKftrVbWn2W718DdL30ri';
const BASE_URL = `https://locator.uberall.com/api/storefinders/${API_KEY}`;

let allStations = [];
let userLat = null, userLng = null;
let activeFilters = new Set();
let currentView = 'both';
let map = null, markers = {};
let routeControl = null, userMarker = null;
let cancelLoad = false;

// ═══════════════════════════════════════════════════════
// FUEL DETECTION — keywords in services/labels
// ═══════════════════════════════════════════════════════
// Exact service strings from Agrola/Uberall API:
// "Diesel", "Bleifrei 95", "Bleifrei 98", "Diesel cleanline",
// "AdBlue LKW", "AdBlue PW", "HVO", "E-Ladestation", "CNG", "LPG",
// "LKW geeignet", "Sattelschlepper geeignet", "3 - 4 m", "3 m",
// "selfwash (1 Platz)", "selfwash (2 Plätze)", "selfwash (3 Plätze)", "selfwash (6 Plätze)",
// "carwash (Portalwaschanlage)", "TopShop", "Shop", "LAVEBA Shop"
function detectFuels(station) {
  const svcs = new Set(Array.isArray(station.services) ? station.services : []);
  return {
    diesel:  svcs.has('Diesel') || svcs.has('Diesel cleanline'),
    b95:     svcs.has('Bleifrei 95'),
    b98:     svcs.has('Bleifrei 98'),
    adblue:  svcs.has('AdBlue LKW') || svcs.has('AdBlue PW'),
    hvo:     svcs.has('HVO'),
    ev:      svcs.has('E-Ladestation'),
    cng:     svcs.has('CNG'),
    lpg:     svcs.has('LPG'),
    wash:    svcs.has('carwash (Portalwaschanlage)') || [...svcs].some(s => s.startsWith('selfwash')),
    shop:    svcs.has('TopShop') || svcs.has('Shop') || svcs.has('LAVEBA Shop'),
    lkw:     svcs.has('LKW geeignet') || svcs.has('Sattelschlepper geeignet'),
    // No E85 in the dataset! The closest would be checked via description
    e85:     [...svcs].some(s => s.toLowerCase().includes('e85') || s.toLowerCase().includes('ethanol')),
  };
}

// ═══════════════════════════════════════════════════════
// FETCH ALL STATIONS
// ═══════════════════════════════════════════════════════
async function loadStations(forceRefresh = false) {
  cancelLoad = false;

  // Try cache first
  if (!forceRefresh) {
    try {
      const cached = localStorage.getItem(STORAGE_KEY);
      if (cached) {
        const data = JSON.parse(cached);
        if (Date.now() - data.ts < 86400000 * 7) { // 7 days
          allStations = data.stations;
          hideLoading();
          setStatus('idle');
          sortAndRender();
          updateCounts();
          return;
        }
      }
    } catch(e) {}
  }

  showLoading();
  setStatus('loading');

  try {
    setLoadStatus(t('status_loading'));
    setLoadProgress(5);

    // Fetch all locations — request services + key fields explicitly
    const allFields = ['id','name','lat','lng','city','streetAndNumber','zip','country',
      'services','labels','categories','descriptionLong','descriptionShort'].map(f=>`fieldMask=${f}`).join('&');
    const resp = await fetch(`${BASE_URL}/locations/all?v=20241126&${allFields}`);
    const data = await resp.json();
    const locs = data.response?.locations || [];
    
    setLoadProgress(20);

    // /all endpoint never includes services — must fetch each station individually
    const results = [];
    setLoadStatus(`${locs.length} Standorte gefunden. Details werden geladen...`);

    for (let i = 0; i < locs.length; i++) {
      if (cancelLoad) break;
      const loc = locs[i];
      let detail = loc;
      try {
        const dr = await fetch(`${BASE_URL}/locations/${loc.id}?v=20241126`);
        const dd = await dr.json();
        // API returns location data directly in dd.response, NOT dd.response.location
        detail = dd.response || loc;
      } catch(e) { /* use basic loc data, services will be empty */ }

      results.push({
        id: loc.id,
        name: detail.name || loc.name,
        lat: parseFloat(detail.lat || loc.lat),
        lng: parseFloat(detail.lng || loc.lng),
        city: detail.city || loc.city,
        street: detail.streetAndNumber || loc.streetAndNumber || '',
        zip: detail.zip || loc.zip,
        fuels: detectFuels(detail),
        services: detail.services || [],
        raw: detail,
      });

      setLoadProgress(20 + Math.floor((i / locs.length) * 75));
      setLoadStatus(`${i+1} / ${locs.length} — ${loc.name || ''}`);
      if (i % 5 === 4) await new Promise(r => setTimeout(r, 80));
    }

    setLoadProgress(98);
    allStations = results;

    // Cache
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ts: Date.now(), stations: results }));
    } catch(e) {}

    setLoadProgress(100);
    setLoadStatus(t('status_done'));
    await new Promise(r => setTimeout(r, 500));
    hideLoading();
    setStatus('idle');
    sortAndRender();
    updateCounts();

  } catch(err) {
    console.error(err);
    setStatus('error');
    setLoadStatus('FEHLER: ' + err.message);
    document.getElementById('btn-cancel-load').textContent = 'SCHLIESSEN';
  }
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function setLoadStatus(msg) { document.getElementById('load-status').textContent = msg; }
function setLoadProgress(pct) {
  document.getElementById('load-bar').style.width = pct + '%';
}
function setStatus(state) {
  const dot = document.getElementById('dot-data');
  const txt = document.getElementById('status-text');
  dot.className = 'dot ' + (state === 'loading' ? 'active' : state === 'error' ? 'error' : '');
  txt.textContent = t('status_' + state);

  const pb = document.getElementById('progress-bar');
  pb.style.display = state === 'loading' ? 'block' : 'none';
}

function updateCounts() {
  const e85count = allStations.filter(s => s.fuels.e85).length;
  document.getElementById('n-total').textContent = allStations.length;
  document.getElementById('n-e85').textContent = e85count;
}

// ═══════════════════════════════════════════════════════
// GEOLOCATION
// ═══════════════════════════════════════════════════════
function locateUser() {
  if (!navigator.geolocation) {
    alert(t('no_location'));
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    document.getElementById('stat-loc').style.display = '';
    document.getElementById('loc-display').textContent =
      userLat.toFixed(4) + ', ' + userLng.toFixed(4);

    if (map) {
      map.setView([userLat, userLng], 11);
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userLat, userLng], {
        icon: L.divIcon({
          html: `<div style="width:14px;height:14px;background:var(--green);border-radius:50%;border:3px solid #000;box-shadow:0 0 8px #00ff88"></div>`,
          iconSize: [14,14], iconAnchor: [7,7], className: ''
        }),
        zIndexOffset: 1000
      }).addTo(map).bindPopup('<span style="color:var(--green)">◉ YOU</span>');
    }
    // Switch sort to distance
    document.getElementById('sort-select').value = 'distance';
    sortAndRender();
  }, () => alert(t('no_location')));
}

function routeTo(station) {
  if (userLat === null) {
    alert(t('no_location'));
    return;
  }
  if (!map) return;

  // Clear existing route
  clearRoute();

  // Switch to map/both view so route is visible
  if (currentView === 'list') setView('both');

  routeControl = L.Routing.control({
    waypoints: [
      L.latLng(userLat, userLng),
      L.latLng(station.lat, station.lng)
    ],
    router: L.Routing.osrmv1({
      serviceUrl: 'https://router.project-osrm.org/route/v1',
      profile: 'driving'
    }),
    lineOptions: {
      styles: [
        { color: '#000', weight: 8, opacity: 0.4 },
        { color: '#e8e000', weight: 3, opacity: 1, dashArray: null }
      ],
      extendToWaypoints: true,
      missingRouteTolerance: 0
    },
    show: false,        // hide default panel
    addWaypoints: false,
    routeWhileDragging: false,
    fitSelectedRoutes: true,
    createMarker: () => null, // use our own markers
  }).addTo(map);

  routeControl.on('routesfound', function(e) {
    const route = e.routes[0].summary;
    const km = (route.totalDistance / 1000).toFixed(1);
    const mins = Math.round(route.totalTime / 60);
    const hrs = Math.floor(mins / 60);
    const timeStr = hrs > 0 ? `${hrs}h ${mins % 60}min` : `${mins} min`;

    document.getElementById('route-dist').textContent = km + ' km';
    document.getElementById('route-time').textContent = timeStr;
    document.getElementById('route-dest').textContent = station.name;
    document.getElementById('route-bar').classList.add('visible');
  });

  routeControl.on('routingerror', function() {
    document.getElementById('route-dest').textContent = 'Routing fehlgeschlagen';
    document.getElementById('route-bar').classList.add('visible');
  });
}

function clearRoute() {
  if (routeControl) {
    map.removeControl(routeControl);
    routeControl = null;
  }
  document.getElementById('route-bar').classList.remove('visible');
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function toggleFilter(f) {
  if (activeFilters.has(f)) activeFilters.delete(f);
  else activeFilters.add(f);
  document.getElementById('tog-' + f).classList.toggle('on', activeFilters.has(f));
  sortAndRender();
}

function stationMatchesFilters(s) {
  if (activeFilters.size === 0) return true;
  for (const f of activeFilters) {
    if (s.fuels[f]) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function sortAndRender() {
  let stations = allStations.filter(stationMatchesFilters);

  // Add distances
  stations = stations.map(s => ({
    ...s,
    dist: (userLat !== null && !isNaN(s.lat) && !isNaN(s.lng))
      ? haversine(userLat, userLng, s.lat, s.lng)
      : null
  }));

  const sortBy = document.getElementById('sort-select').value;
  if (sortBy === 'distance' && userLat !== null) {
    stations.sort((a,b) => (a.dist ?? 9999) - (b.dist ?? 9999));
  } else {
    stations.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
  }

  renderList(stations);
  renderMap(stations);

  document.getElementById('n-showing').textContent = stations.length;
  document.getElementById('n-total-bot').textContent = allStations.length;
  document.getElementById('empty-state').classList.toggle('visible', stations.length === 0);
}

function fuelTags(fuels) {
  const tags = [];
  if (fuels.e85)    tags.push(`<span class="tag e85">E85</span>`);
  if (fuels.hvo)    tags.push(`<span class="tag hvo">HVO</span>`);
  if (fuels.b95)    tags.push(`<span class="tag b95">95</span>`);
  if (fuels.b98)    tags.push(`<span class="tag b98">98</span>`);
  if (fuels.diesel) tags.push(`<span class="tag diesel">Diesel</span>`);
  if (fuels.adblue) tags.push(`<span class="tag adblue">AdBlue</span>`);
  if (fuels.ev)     tags.push(`<span class="tag ev">EV⚡</span>`);
  if (fuels.cng)    tags.push(`<span class="tag cng">CNG</span>`);
  if (fuels.lpg)    tags.push(`<span class="tag lpg">LPG</span>`);
  if (fuels.wash)   tags.push(`<span class="tag wash">Wash</span>`);
  if (fuels.shop)   tags.push(`<span class="tag shop">Shop</span>`);
  return tags.join('');
}

function mapsUrl(s) {
  return `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
}

function renderList(stations) {
  const container = document.getElementById('station-list');
  container.innerHTML = stations.map(s => {
    const addr = [s.street, s.streetNo, s.zip, s.city].filter(Boolean).join(' ');
    const distStr = s.dist !== null ? `${s.dist.toFixed(1)} ${t('km_away')}` : '';
    const hasE85 = s.fuels.e85;
    return `
    <div class="station-card ${hasE85 ? 'has-e85' : ''}" onclick="highlightStation(${s.id})" id="card-${s.id}">
      <div class="card-name">${s.name || '—'}</div>
      <div class="card-addr">${addr}</div>
      ${distStr ? `<div class="card-dist">${distStr}</div>` : ''}
      <div class="card-tags">${fuelTags(s.fuels)}</div>
      <a class="card-gmaps" href="${mapsUrl(s)}" target="_blank" onclick="event.stopPropagation()">▶ ${t('navigate')}</a>${userLat !== null ? `<button class="card-route" onclick="event.stopPropagation();routeTo(allStations.find(x=>x.id===${s.id}))">⊕ ROUTE</button>` : ''}
    </div>`;
  }).join('');
}

function renderMap(stations) {
  if (!map) return;

  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  stations.forEach(s => {
    if (isNaN(s.lat) || isNaN(s.lng)) return;
    const isE85 = s.fuels.e85;
    const color = isE85 ? '#00ff88' : '#e8e000';
    const icon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:${color};border:2px solid #000;transform:rotate(45deg)"></div>`,
      iconSize: [10,10],
      iconAnchor: [5,5],
      className: ''
    });
    const addr = [s.street, s.streetNo, s.zip, s.city].filter(Boolean).join(' ');
    const marker = L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-name">${s.name}</div>
        <div class="popup-addr">${addr}</div>
        <div style="margin:4px 0">${fuelTags(s.fuels)}</div>
        <a href="${mapsUrl(s)}" target="_blank" class="card-gmaps">▶ ${t('navigate')}</a>
        <button class="card-route" onclick="routeTo(allStations.find(x=>x.id===${s.id}))" style="margin-left:4px">⊕ ROUTE</button>
      `);
    marker.on('click', () => highlightStation(s.id));
    markers[s.id] = marker;
  });
}

function highlightStation(id) {
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('highlighted'));
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('highlighted');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  if (markers[id]) {
    markers[id].openPopup();
    map?.setView(markers[id].getLatLng(), Math.max(map.getZoom(), 13));
  }
}

// ═══════════════════════════════════════════════════════
// VIEW
// ═══════════════════════════════════════════════════════
function setView(v) {
  currentView = v;
  document.body.className = document.body.className.replace(/view-\w+/, '') + ' view-' + v;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (map) setTimeout(() => map.invalidateSize(), 50);
}

// ═══════════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([47.0, 8.3], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
}

// ═══════════════════════════════════════════════════════
// REFRESH / CANCEL
// ═══════════════════════════════════════════════════════
function confirmRefresh() {
  if (confirm(t('confirm_refresh'))) loadStations(true);
}

document.getElementById('btn-cancel-load').onclick = () => {
  cancelLoad = true;
  hideLoading();
  if (allStations.length > 0) {
    setStatus('idle');
    sortAndRender();
    updateCounts();
  }
};

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
initMap();
applyI18n();
loadStations();
</script>
