<html lang="en">
<head>

<style>
  :root {
    --bg: #0a0a0a;
    --paper: #111;
    --border: #e8e000;
    --accent: #e8e000;
    --danger: #ff3300;
    --text: #e8e8e8;
    --muted: #555;
    --green: #00ff88;
    --card-bg: #161616;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    overflow-x: hidden;
  }

  #header {
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 44px;
    border-bottom: 3px solid #000;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  #logo {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #000;
  }
  #logo span {
    background: #000;
    color: var(--accent);
    padding: 1px 6px;
    margin-left: 4px;
  }

  #lang-switch {
    display: flex;
    gap: 0;
    border: 2px solid #000;
  }
  #lang-switch button {
    background: transparent;
    border: none;
    border-right: 2px solid #000;
    padding: 4px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #000;
    transition: background 0.1s;
  }
  #lang-switch button:last-child { border-right: none; }
  #lang-switch button.active, #lang-switch button:hover {
    background: #000;
    color: var(--accent);
  }

  #statusbar {
    background: #000;
    border-bottom: 1px solid var(--muted);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    flex-wrap: wrap;
  }
  #statusbar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 4px;
  }
  #statusbar .dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  #statusbar .dot.error { background: var(--danger); }
  #statusbar .dot.bg { background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #bg-scan-indicator {
    font-size: 10px;
    color: var(--accent);
    display: none;
    letter-spacing: 1px;
  }
  #bg-scan-indicator.visible { display: inline; }

  #controls {
    background: var(--paper);
    border-bottom: 2px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ctrl-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .filter-toggle {
    border: 2px solid var(--muted);
    background: transparent;
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.1s;
    text-transform: uppercase;
  }
  .filter-toggle.on {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  #view-switch {
    margin-left: auto;
    display: flex;
    border: 2px solid var(--border);
  }
  #view-switch button {
    background: transparent;
    border: none;
    border-right: 2px solid var(--border);
    padding: 4px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.1s;
  }
  #view-switch button:last-child { border-right: none; }
  #view-switch button.active {
    background: var(--border);
    color: #000;
  }

  #sort-ctrl { display: flex; align-items: center; gap: 6px; }
  #sort-select {
    background: var(--bg);
    border: 2px solid var(--muted);
    color: var(--text);
    padding: 3px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }

  #btn-locate {
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;

    letter-spacing: 1px;

  #btn-refresh {
    background: transparent;
    border: 2px solid var(--muted);
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;

  #main {
    display: flex;
    height: calc(100vh - 44px - 30px - 50px);

  }

  #map-container { flex: 1; display: none; position: relative; }
  #map-container.visible { display: block; }
  #map { width: 100%; height: 100%; }

  #list-container {
    width: 100%;
    overflow-y: auto;
    border-right: 1px solid var(--muted);
    display: none;
  }
  #list-container.visible { display: block; }

  body.view-both #list-container {
    display: block;
    width: 380px;
    min-width: 280px;
    flex-shrink: 0;
  }
  body.view-both #map-container { display: block; flex: 1; }
  body.view-list #list-container { display: block; width: 100%; }
  body.view-map #map-container { display: block; width: 100%; }

  .station-card {
    border-bottom: 1px solid #222;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .station-card:hover { background: #1a1a1a; }
  .station-card.highlighted { background: #1d1d00; border-left: 3px solid var(--accent); }
  .station-card.has-e85 { border-left: 3px solid var(--green); }
  .station-card.highlighted.has-e85 { border-left: 3px solid var(--accent); }
  .station-card.new-find {
    animation: flashNew 1.5s ease-out;

  @keyframes flashNew {
    0% { background: #003322; }

  .card-name {

  .tag.adblue { border-color: #88aaff; color: #88aaff; }
  .tag.ev     { border-color: #00ffcc; color: #00ffcc; }
  .tag.cng    { border-color: #ff88ff; color: #ff88ff; }
  .tag.lpg    { border-color: #ffaa00; color: #ffaa00; }

  .tag.b98    { border-color: #cccccc; color: #cccccc; }

  .tag.shop   { border-color: #ff99cc; color: #ff99cc; }

    margin-top: 6px;

  #count-bar {
    background: #000;
    border-top: 1px solid #222;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 16px;

    display: none;
    background: #0d0d00;
    border-bottom: 1px solid #333;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
    gap: 10px;

  #scan-progress-text { color: var(--accent); }
  #scan-bar-wrap { flex: 1; max-width: 200px; height: 2px; background: #222; }

  #route-bar {
    display: none;
    background: #000;
    border-top: 2px solid var(--accent);

    font-size: 11px;

    margin-top: 6px;

    font-size: 10px;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent);
    padding: 2px 8px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;

  .leaflet-popup-content-wrapper {
    background: var(--paper);

  body.lang-ja .card-name,
  body.lang-ja .card-addr,
  body.lang-ja .tag,
  body.lang-ja .ctrl-label,

</style>

<script>
// ═══════════════════════════════════════════════════════
// I18N
// ═══════════════════════════════════════════════════════
const I18N = {
  de: {
    stations: 'STANDORTE', your_loc: 'STANDORT', filter: 'FILTER', sort: 'SORT',
    by_distance: 'ENTFERNUNG', by_name: 'NAME', locate: 'ORTEN', refresh: 'AKTUALISIEREN',
    view_list: 'LISTE', view_both: 'BEIDE', view_map: 'KARTE', no_results: 'KEINE ERGEBNISSE',
    showing: 'ANZEIGE', navigate: 'NAVIGIEREN', status_loading: 'LADEN...', status_done: 'BEREIT',
    status_error: 'FEHLER', status_idle: 'BEREIT', route_dist: 'STRECKE', route_time: 'FAHRZEIT',
    confirm_refresh: 'Alle Standortdaten neu laden? (Full scan ~1-2 min)',
    km_away: 'km', no_location: 'Standort nicht verfügbar',
  },
  en: {
    stations: 'STATIONS', your_loc: 'YOUR LOC', filter: 'FILTER', sort: 'SORT',
    by_distance: 'DISTANCE', by_name: 'NAME', locate: 'LOCATE ME', refresh: 'REFRESH',
    view_list: 'LIST', view_both: 'BOTH', view_map: 'MAP', no_results: 'NO RESULTS',
    showing: 'SHOWING', navigate: 'NAVIGATE', status_loading: 'LOADING...', status_done: 'READY',
    status_error: 'ERROR', status_idle: 'READY', route_dist: 'DISTANCE', route_time: 'DRIVE TIME',
    confirm_refresh: 'Reload all station data? Full background scan ~1-2 min.',
    km_away: 'km', no_location: 'Location unavailable',
  },
  ja: {
    stations: 'スタンド', your_loc: '現在地', filter: 'フィルター', sort: '並び替え',
    by_distance: '距離順', by_name: '名前順', locate: '現在地取得', refresh: '更新',
    view_list: 'リスト', view_both: '両方', view_map: '地図', no_results: '結果なし',
    showing: '表示中', navigate: 'ナビ', status_loading: '読込中...', status_done: '準備完了',
    status_error: 'エラー', status_idle: '準備完了', route_dist: '距離', route_time: '所要時間',
    confirm_refresh: 'スタンドデータを再読み込みしますか？',
    km_away: 'km', no_location: '現在地を取得できません',
  }
};
let lang = 'en';

function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N['en'][key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.body.className = document.body.className.replace(/lang-\w+/g, '').trim() + ' lang-' + l;
  applyI18n();
  sortAndRender();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelector('#sort-select option[value="distance"]').textContent = t('by_distance');
  document.querySelector('#sort-select option[value="name"]').textContent = t('by_name');
}

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const API_KEY = 'xZGQPdiHSCKftrVbWn2W718DdL30ri';
const BASE_URL = `https://locator.uberall.com/api/storefinders/${API_KEY}`;

// Known E85 station IDs (verified from cache)
const KNOWN_E85_IDS = [1568624, 1568742, 1568842, 1568859, 1568878, 1568965, 1569030];

const CACHE_E85    = 'agrola_e85_known_v1';   // known E85 — 24h TTL
const CACHE_FULL   = 'agrola_full_v7';         // full scan — 7 day TTL
const TTL_E85      = 86400000;                 // 24 hours
const TTL_FULL     = 86400000 * 7;             // 7 days

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let allStations = [];          // currently displayed stations
let fullStationMap = new Map(); // id -> station, full dataset
let userLat = null, userLng = null;
let activeFilters = new Set(['e85']); // E85 on by default
let currentView = 'both';
let map = null, markers = {};
let routeControl = null, userMarker = null;
let bgScanNewCount = 0;

// ═══════════════════════════════════════════════════════
// FUEL DETECTION
// ═══════════════════════════════════════════════════════
function detectFuels(station) {
  const svcs = new Set(Array.isArray(station.services) ? station.services : []);
  return {
    diesel:  svcs.has('Diesel') || svcs.has('Diesel cleanline'),
    b95:     svcs.has('Bleifrei 95'),
    b98:     svcs.has('Bleifrei 98'),
    adblue:  svcs.has('AdBlue LKW') || svcs.has('AdBlue PW'),
    hvo:     svcs.has('HVO'),
    ev:      svcs.has('E-Ladestation'),
    cng:     svcs.has('CNG'),
    lpg:     svcs.has('LPG'),
    wash:    svcs.has('carwash (Portalwaschanlage)') || [...svcs].some(s => s.startsWith('selfwash')),
    shop:    svcs.has('TopShop') || svcs.has('Shop') || svcs.has('LAVEBA Shop'),
    lkw:     svcs.has('LKW geeignet') || svcs.has('Sattelschlepper geeignet'),
    e85:     [...svcs].some(s => s.toLowerCase().includes('e85') || s.toLowerCase().includes('ethanol')),
  };
}

function buildStation(detail, fallback) {
  return {
    id:       detail.id || fallback.id,
    name:     detail.name || fallback.name,
    lat:      parseFloat(detail.lat || fallback.lat),
    lng:      parseFloat(detail.lng || fallback.lng),
    city:     detail.city || fallback.city,
    street:   detail.streetAndNumber || fallback.streetAndNumber || '',
    zip:      detail.zip || fallback.zip,
    fuels:    detectFuels(detail),
    services: detail.services || [],
    raw:      detail,
  };
}

async function fetchStationDetail(id) {
  const dr = await fetch(`${BASE_URL}/locations/${id}?v=20241126`);
  const dd = await dr.json();
  return dd.response || null;
}

// ═══════════════════════════════════════════════════════
// PHASE 1: FAST — load known E85 stations
// ═══════════════════════════════════════════════════════
async function loadKnownE85() {
  // Check cache first
  try {
    const cached = localStorage.getItem(CACHE_E85);
    if (cached) {
      const data = JSON.parse(cached);
      if (Date.now() - data.ts < TTL_E85) {
        data.stations.forEach(s => fullStationMap.set(s.id, s));
        allStations = [...fullStationMap.values()];
        setStatus('idle');
        sortAndRender();
        updateCounts();
        return true; // loaded from cache
      }
    }
  } catch(e) {}

  setStatus('loading');
  document.getElementById('status-text').textContent = 'VERIFYING E85 STATIONS...';

  // Fetch all known IDs in parallel
  const results = await Promise.allSettled(
    KNOWN_E85_IDS.map(id => fetchStationDetail(id))
  );

  const stations = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) {
      const s = buildStation(r.value, { id: KNOWN_E85_IDS[i] });
      stations.push(s);
      fullStationMap.set(s.id, s);
    }
  });

  // Cache E85 stations
  try {
    localStorage.setItem(CACHE_E85, JSON.stringify({ ts: Date.now(), stations }));
  } catch(e) {}

  allStations = [...fullStationMap.values()];
  setStatus('idle');
  sortAndRender();
  updateCounts();
  return false; // fetched fresh
}

// ═══════════════════════════════════════════════════════
// PHASE 2: BACKGROUND — full scan for new E85 stations
// ═══════════════════════════════════════════════════════
async function backgroundFullScan(force = false) {
  // Check if we already have a recent full scan
  if (!force) {
    try {
      const cached = localStorage.getItem(CACHE_FULL);
      if (cached) {
        const data = JSON.parse(cached);
        if (Date.now() - data.ts < TTL_FULL) {
          // Merge cached full data into map (for non-E85 stations)
          let merged = false;
          data.stations.forEach(s => {
            if (!fullStationMap.has(s.id)) {
              fullStationMap.set(s.id, s);
              merged = true;
            }
          });
          if (merged) {
            allStations = [...fullStationMap.values()];
            sortAndRender();
            updateCounts();
          }
          return; // full scan still valid
        }
      }
    } catch(e) {}
  }

  // Run background scan
  const banner = document.getElementById('scan-banner');
  const bgInd  = document.getElementById('bg-scan-indicator');
  banner.classList.add('visible');
  bgInd.classList.add('visible');
  bgScanNewCount = 0;

  try {
    const allFields = ['id','name','lat','lng','city','streetAndNumber','zip'].map(f=>`fieldMask=${f}`).join('&');
    const resp = await fetch(`${BASE_URL}/locations/all?v=20241126&${allFields}`);
    const data = await resp.json();
    const locs = data.response?.locations || [];

    // Skip IDs we already have fresh data for
    const knownIds = new Set(fullStationMap.keys());
    const toFetch = locs.filter(l => !knownIds.has(l.id));

    document.getElementById('scan-progress-text').textContent = `0 / ${toFetch.length}`;

    for (let i = 0; i < toFetch.length; i++) {
      const loc = toFetch[i];
      let detail = loc;
      try {
        const dr = await fetch(`${BASE_URL}/locations/${loc.id}?v=20241126`);
        const dd = await dr.json();
        detail = dd.response || loc;
      } catch(e) {}

      const s = buildStation(detail, loc);
      const wasNew = !fullStationMap.has(s.id);
      const hadE85Before = fullStationMap.get(s.id)?.fuels?.e85;

      fullStationMap.set(s.id, s);

      // If this is a newly discovered E85 station, surface it immediately
      if (s.fuels.e85 && (wasNew || !hadE85Before)) {
        bgScanNewCount++;
        document.getElementById('scan-new-count').textContent = bgScanNewCount;
        document.getElementById('scan-new-found').style.display = '';

        // Update known E85 cache with the new find
        try {
          const e85cached = localStorage.getItem(CACHE_E85);
          const e85data = e85cached ? JSON.parse(e85cached) : { ts: Date.now(), stations: [] };
          if (!e85data.stations.find(x => x.id === s.id)) {
            e85data.stations.push(s);
            localStorage.setItem(CACHE_E85, JSON.stringify(e85data));
          }
        } catch(e) {}

        allStations = [...fullStationMap.values()];
        sortAndRender(s.id); // pass id to flash the new card
        updateCounts();
      }

      // Update progress
      const pct = Math.floor(((i+1) / toFetch.length) * 100);
      document.getElementById('scan-bar-fill').style.width = pct + '%';
      document.getElementById('scan-progress-text').textContent = `${i+1} / ${toFetch.length}`;

      // Small yield every 10 stations to keep UI responsive
      if (i % 10 === 9) await new Promise(r => setTimeout(r, 50));
    }

    // Merge any updated data into allStations
    allStations = [...fullStationMap.values()];
    sortAndRender();
    updateCounts();

    // Cache full scan
    try {
      localStorage.setItem(CACHE_FULL, JSON.stringify({
        ts: Date.now(),
        stations: [...fullStationMap.values()]
      }));
    } catch(e) {}

  } catch(err) {
    console.error('Background scan error:', err);
  }

  banner.classList.remove('visible');
  bgInd.classList.remove('visible');
}

// ═══════════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════
async function boot() {
  await loadKnownE85();
  // Start background scan without awaiting — runs silently
  backgroundFullScan();
}

function confirmRefresh() {
  if (confirm(t('confirm_refresh'))) {
    localStorage.removeItem(CACHE_E85);
    localStorage.removeItem(CACHE_FULL);
    fullStationMap.clear();
    allStations = [];
    sortAndRender();
    boot();
  }
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function setStatus(state) {
  const dot = document.getElementById('dot-data');
  const txt = document.getElementById('status-text');
  dot.className = 'dot ' + (state === 'loading' ? 'active' : state === 'error' ? 'error' : '');
  txt.textContent = t('status_' + state);
}

function updateCounts() {
  const e85count = [...fullStationMap.values()].filter(s => s.fuels.e85).length;
  document.getElementById('n-total').textContent = fullStationMap.size;
  document.getElementById('n-e85').textContent = e85count;
}

// ═══════════════════════════════════════════════════════
// GEOLOCATION
// ═══════════════════════════════════════════════════════
function locateUser() {
  if (!navigator.geolocation) { alert(t('no_location')); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    document.getElementById('stat-loc').style.display = '';
    document.getElementById('loc-display').textContent = userLat.toFixed(4) + ', ' + userLng.toFixed(4);
    if (map) {
      map.setView([userLat, userLng], 11);
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userLat, userLng], {
        icon: L.divIcon({
          html: `<div style="width:14px;height:14px;background:var(--green);border-radius:50%;border:3px solid #000;box-shadow:0 0 8px #00ff88"></div>`,
          iconSize: [14,14], iconAnchor: [7,7], className: ''
        }),
        zIndexOffset: 1000
      }).addTo(map).bindPopup('<span style="color:var(--green)">◉ YOU</span>');
    }
    document.getElementById('sort-select').value = 'distance';
    sortAndRender();
  }, () => alert(t('no_location')));
}

function routeTo(station) {
  if (userLat === null) { alert(t('no_location')); return; }
  if (!map) return;
  clearRoute();
  if (currentView === 'list') setView('both');
  routeControl = L.Routing.control({
    waypoints: [L.latLng(userLat, userLng), L.latLng(station.lat, station.lng)],
    router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'driving' }),
    lineOptions: {
      styles: [{ color: '#000', weight: 8, opacity: 0.4 }, { color: '#e8e000', weight: 3, opacity: 1 }],
      extendToWaypoints: true, missingRouteTolerance: 0
    },
    show: false, addWaypoints: false, routeWhileDragging: false,
    fitSelectedRoutes: true, createMarker: () => null,
  }).addTo(map);
  routeControl.on('routesfound', function(e) {
    const route = e.routes[0].summary;
    const km = (route.totalDistance / 1000).toFixed(1);
    const mins = Math.round(route.totalTime / 60);
    const hrs = Math.floor(mins / 60);
    document.getElementById('route-dist').textContent = km + ' km';
    document.getElementById('route-time').textContent = hrs > 0 ? `${hrs}h ${mins % 60}min` : `${mins} min`;
    document.getElementById('route-dest').textContent = station.name;
    document.getElementById('route-bar').classList.add('visible');
  });
}

function clearRoute() {
  if (routeControl) { map.removeControl(routeControl); routeControl = null; }
  document.getElementById('route-bar').classList.remove('visible');
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function toggleFilter(f) {
  if (activeFilters.has(f)) activeFilters.delete(f);
  else activeFilters.add(f);
  document.getElementById('tog-' + f).classList.toggle('on', activeFilters.has(f));
  sortAndRender();
}

function stationMatchesFilters(s) {
  if (activeFilters.size === 0) return true;
  for (const f of activeFilters) { if (s.fuels[f]) return true; }
  return false;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function sortAndRender(flashId = null) {
  let stations = [...fullStationMap.values()].filter(stationMatchesFilters);
  stations = stations.map(s => ({
    ...s,
    dist: (userLat !== null && !isNaN(s.lat) && !isNaN(s.lng))
      ? haversine(userLat, userLng, s.lat, s.lng) : null
  }));
  const sortBy = document.getElementById('sort-select').value;
  if (sortBy === 'distance' && userLat !== null) {
    stations.sort((a,b) => (a.dist ?? 9999) - (b.dist ?? 9999));
  } else {
    stations.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
  }
  renderList(stations, flashId);
  renderMap(stations);
  document.getElementById('n-showing').textContent = stations.length;
  document.getElementById('n-total-bot').textContent = fullStationMap.size;
  document.getElementById('empty-state').classList.toggle('visible', stations.length === 0);
}

function fuelTags(fuels) {
  const tags = [];
  if (fuels.e85)    tags.push(`<span class="tag e85">E85</span>`);
  if (fuels.hvo)    tags.push(`<span class="tag hvo">HVO</span>`);
  if (fuels.b95)    tags.push(`<span class="tag b95">95</span>`);
  if (fuels.b98)    tags.push(`<span class="tag b98">98</span>`);
  if (fuels.diesel) tags.push(`<span class="tag diesel">Diesel</span>`);
  if (fuels.adblue) tags.push(`<span class="tag adblue">AdBlue</span>`);
  if (fuels.ev)     tags.push(`<span class="tag ev">EV⚡</span>`);
  if (fuels.cng)    tags.push(`<span class="tag cng">CNG</span>`);
  if (fuels.lpg)    tags.push(`<span class="tag lpg">LPG</span>`);
  if (fuels.wash)   tags.push(`<span class="tag wash">Wash</span>`);
  if (fuels.shop)   tags.push(`<span class="tag shop">Shop</span>`);
  return tags.join('');
}

function mapsUrl(s) {
  return `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
}

function renderList(stations, flashId = null) {
  const container = document.getElementById('station-list');
  container.innerHTML = stations.map(s => {
    const addr = [s.street, s.zip, s.city].filter(Boolean).join(' ');
    const distStr = s.dist !== null ? `${s.dist.toFixed(1)} ${t('km_away')}` : '';
    return `
    <div class="station-card ${s.fuels.e85 ? 'has-e85' : ''} ${flashId === s.id ? 'new-find' : ''}"
         onclick="highlightStation(${s.id})" id="card-${s.id}">
      <div class="card-name">${s.name || '—'}</div>
      <div class="card-addr">${addr}</div>
      ${distStr ? `<div class="card-dist">${distStr}</div>` : ''}
      <div class="card-tags">${fuelTags(s.fuels)}</div>
      <a class="card-gmaps" href="${mapsUrl(s)}" target="_blank" onclick="event.stopPropagation()">▶ ${t('navigate')}</a>${userLat !== null ? `<button class="card-route" onclick="event.stopPropagation();routeTo(fullStationMap.get(${s.id}))">⊕ ROUTE</button>` : ''}
    </div>`;
  }).join('');
}

function renderMap(stations) {
  if (!map) return;
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  stations.forEach(s => {
    if (isNaN(s.lat) || isNaN(s.lng)) return;
    const color = s.fuels.e85 ? '#00ff88' : '#e8e000';
    const icon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:${color};border:2px solid #000;transform:rotate(45deg)"></div>`,
      iconSize: [10,10], iconAnchor: [5,5], className: ''
    });
    const addr = [s.street, s.zip, s.city].filter(Boolean).join(' ');
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(`
      <div class="popup-name">${s.name}</div>
      <div class="popup-addr">${addr}</div>
      <div style="margin:4px 0">${fuelTags(s.fuels)}</div>
      <a href="${mapsUrl(s)}" target="_blank" class="card-gmaps">▶ ${t('navigate')}</a>
      <button class="card-route" onclick="routeTo(fullStationMap.get(${s.id}))" style="margin-left:4px">⊕ ROUTE</button>
    `);
    marker.on('click', () => highlightStation(s.id));
    markers[s.id] = marker;
  });
}

function highlightStation(id) {
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('highlighted'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('highlighted'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  if (markers[id]) { markers[id].openPopup(); map?.setView(markers[id].getLatLng(), Math.max(map.getZoom(), 13)); }
}

// ═══════════════════════════════════════════════════════
// VIEW
// ═══════════════════════════════════════════════════════
function setView(v) {
  currentView = v;
  document.body.className = document.body.className.replace(/view-\w+/g, '') + ' view-' + v;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (map) setTimeout(() => map.invalidateSize(), 50);
}

// ═══════════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([47.0, 8.3], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
initMap();
applyI18n();
boot();
</script>
